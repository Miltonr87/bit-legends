<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Bit Legends Emulator</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-overflow-scrolling: touch;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
      }
      #game {
        width: 100%;
        height: 100%;
        overscroll-behavior: none;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script>
      // Prevent mobile browser refresh gestures
      document.addEventListener(
        'touchmove',
        function (e) {
          if (e.target.closest('#game')) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      // Prevent pull-to-refresh
      document.addEventListener(
        'scroll',
        function (e) {
          if (window.scrollY === 0) {
            window.scrollTo(0, 1);
          }
        },
        { passive: true },
      );

      const params = new URLSearchParams(window.location.search);
      const romUrl = params.get('rom') || '';
      const rawPlatform = (params.get('platform') || '').toLowerCase();
      const PLATFORM_TO_CORE = {
        snes: 'snes',
        supernintendo: 'snes',
        'super-nes': 'snes',
        supernes: 'snes',
        genesis: 'segaMD',
        segamd: 'segaMD',
        megadrive: 'segaMD',
        'mega-drive': 'segaMD',
        md: 'segaMD',
        gen: 'segaMD',
        sega: 'segaMD',
      };
      function inferCoreFromRom(url) {
        const lower = url.toLowerCase().split('?')[0];
        if (/\.(smc|sfc)$/.test(lower)) return 'snes';
        if (/\.(bin|gen|md)$/.test(lower)) return 'segaMD';
        return 'snes';
      }
      const requestedCore = PLATFORM_TO_CORE[rawPlatform];
      const core = requestedCore || inferCoreFromRom(romUrl);
      if (!romUrl) {
        document.getElementById('game').innerHTML =
          '<div style="color:#fff;font:16px/1.5 system-ui, sans-serif;padding:20px;">Missing "rom" query param.</div>';
        throw new Error('Missing "rom" query param');
      }
      window.EJS_player = '#game';
      window.EJS_core = core;
      window.EJS_gameUrl = romUrl;
      window.EJS_pathtodata = 'https://www.emulatorjs.com/data/';
      window.EJS_startOnLoaded = true;
      window.EJS_saveFiles = true;
      window.EJS_Storage = window.localStorage;
    </script>
    <script src="https://www.emulatorjs.com/loader.js"></script>
  </body>
</html>
